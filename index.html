<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FENDI — 服務價目表</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=Noto+Serif+TC:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #B8975A;
    --gold-light: #D4B47A;
    --gold-dark: #8A6A30;
    --cream: #F5F0E8;
    --ivory: #FAF7F2;
    --charcoal: #1A1612;
    --brown: #3D2B1F;
    --muted: #7A6A5A;
  }

  body {
    background-color: var(--charcoal);
    color: var(--cream);
    font-family: 'Noto Serif TC', 'Cormorant Garamond', serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  /* Radial glow */
  body::after {
    content: '';
    position: fixed;
    top: -20%;
    left: 50%;
    transform: translateX(-50%);
    width: 80vw;
    height: 60vh;
    background: radial-gradient(ellipse, rgba(184,151,90,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .page {
    position: relative;
    z-index: 1;
    max-width: 820px;
    margin: 0 auto;
    padding: 80px 40px 100px;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    margin-bottom: 70px;
    animation: fadeDown 1s ease both;
  }

  .header-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 22px;
  }

  .header-line .rule {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold));
  }
  .header-line .rule.right {
    background: linear-gradient(to left, transparent, var(--gold));
  }

  .brand {
    font-family: 'Cinzel', serif;
    font-size: clamp(3rem, 8vw, 5.5rem);
    font-weight: 600;
    letter-spacing: 0.35em;
    background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 40%, var(--gold-dark) 70%, var(--gold-light) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.85rem;
    font-style: italic;
    letter-spacing: 0.5em;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 12px;
  }

  .ornament {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 14px;
    margin-top: 28px;
    color: var(--gold);
    opacity: 0.7;
  }
  .ornament span { font-size: 1.1rem; }
  .ornament::before, .ornament::after {
    content: '';
    width: 60px;
    height: 1px;
    background: var(--gold);
    opacity: 0.5;
  }

  /* ── Section title ── */
  .section {
    margin-bottom: 56px;
    animation: fadeUp 1s ease both;
  }
  .section:nth-child(2) { animation-delay: 0.15s; }
  .section:nth-child(3) { animation-delay: 0.3s; }

  .section-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 28px;
  }

  .section-icon {
    width: 36px;
    height: 36px;
    border: 1px solid var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    color: var(--gold);
    flex-shrink: 0;
  }

  .section-title {
    font-family: 'Cinzel', serif;
    font-size: 0.78rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--gold);
  }

  .section-rule {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, rgba(184,151,90,0.5), transparent);
  }

  /* ── Price cards ── */
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
  }

  .card {
    position: relative;
    background: linear-gradient(145deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
    border: 1px solid rgba(184,151,90,0.2);
    padding: 32px 24px;
    text-align: center;
    cursor: default;
    transition: transform 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(145deg, rgba(184,151,90,0.06), transparent);
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  .card:hover {
    transform: translateY(-4px);
    border-color: rgba(184,151,90,0.55);
    box-shadow: 0 20px 50px rgba(0,0,0,0.4), 0 0 30px rgba(184,151,90,0.08);
  }

  .card:hover::before { opacity: 1; }

  .card.featured {
    border-color: rgba(184,151,90,0.45);
    background: linear-gradient(145deg, rgba(184,151,90,0.08), rgba(184,151,90,0.02));
  }

  .card.featured::after {
    content: '推薦';
    position: absolute;
    top: 14px;
    right: -22px;
    background: var(--gold);
    color: var(--charcoal);
    font-family: 'Cinzel', serif;
    font-size: 0.55rem;
    letter-spacing: 0.15em;
    padding: 4px 28px;
    transform: rotate(45deg);
  }

  .card-badge {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.72rem;
    font-style: italic;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .card-name {
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    letter-spacing: 0.2em;
    color: var(--cream);
    margin-bottom: 20px;
  }

  .card-price {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.4rem;
    font-weight: 300;
    line-height: 1;
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .card-price .currency {
    font-size: 1rem;
    vertical-align: super;
    margin-right: 2px;
  }

  .card-divider {
    width: 30px;
    height: 1px;
    background: rgba(184,151,90,0.4);
    margin: 16px auto;
  }

  /* ── Single product card ── */
  .product-card {
    position: relative;
    background: linear-gradient(135deg, rgba(184,151,90,0.07), rgba(255,255,255,0.02));
    border: 1px solid rgba(184,151,90,0.3);
    padding: 40px 44px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 24px;
    transition: transform 0.4s ease, box-shadow 0.4s ease;
    overflow: hidden;
  }

  .product-card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: linear-gradient(to bottom, transparent, var(--gold), transparent);
  }

  .product-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 20px 50px rgba(0,0,0,0.4), 0 0 40px rgba(184,151,90,0.07);
  }

  .product-info {}
  .product-label {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.8rem;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .product-name {
    font-family: 'Cinzel', serif;
    font-size: 1.5rem;
    letter-spacing: 0.2em;
    color: var(--cream);
    margin-bottom: 4px;
  }

  .product-sub {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.95rem;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  .product-price-wrap { text-align: right; flex-shrink: 0; }
  .product-price {
    font-family: 'Cormorant Garamond', serif;
    font-size: 3rem;
    font-weight: 300;
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }
  .product-price .currency {
    font-size: 1.3rem;
    vertical-align: super;
  }
  .product-price-note {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    margin-top: 6px;
  }

  /* ── Footer ── */
  .footer {
    text-align: center;
    margin-top: 80px;
    padding-top: 36px;
    border-top: 1px solid rgba(184,151,90,0.15);
    animation: fadeUp 1s ease 0.5s both;
  }

  .footer-ornament {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.8rem;
    letter-spacing: 0.35em;
    color: rgba(184,151,90,0.45);
    text-transform: uppercase;
  }

  /* ── Animations ── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .page { padding: 50px 20px 70px; }
    .product-card { flex-direction: column; text-align: center; padding: 32px 28px; }
    .product-card::before { width: 100%; height: 3px; right: 0; top: 0; bottom: auto;
      background: linear-gradient(to right, transparent, var(--gold), transparent); }
    .product-price-wrap { text-align: center; }
    .cards { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <header class="header">
    <div class="header-line">
      <div class="rule"></div>
      <div class="brand">FENDI</div>
      <div class="rule right"></div>
    </div>
    <p class="tagline">服務價目表 &nbsp;·&nbsp; Price List</p>
    <div class="ornament"><span>✦</span></div>
  </header>

  <!-- Section 1：課程 -->
  <section class="section">
    <div class="section-header">
      <div class="section-icon">♩</div>
      <span class="section-title">課程 &nbsp;Courses</span>
      <div class="section-rule"></div>
    </div>

    <div class="cards">
      <div class="card">
        <p class="card-badge">Level I</p>
        <p class="card-name">初級</p>
        <div class="card-divider"></div>
        <div class="card-price"><span class="currency">$</span>1,199</div>
      </div>

      <div class="card featured">
        <p class="card-badge">Level II</p>
        <p class="card-name">中級</p>
        <div class="card-divider"></div>
        <div class="card-price"><span class="currency">$</span>1,499</div>
      </div>

      <div class="card">
        <p class="card-badge">Level III</p>
        <p class="card-name">專業級</p>
        <div class="card-divider"></div>
        <div class="card-price"><span class="currency">$</span>1,999</div>
      </div>
    </div>
  </section>

  <!-- Section 2：琴盒 -->
  <section class="section">
    <div class="section-header">
      <div class="section-icon">◈</div>
      <span class="section-title">琴盒 &nbsp;Cases</span>
      <div class="section-rule"></div>
    </div>

    <div class="product-card">
      <div class="product-info">
        <p class="product-label">精品典藏 · Premium Collection</p>
        <p class="product-name">琴盒</p>
        <p class="product-sub">牛皮 &nbsp;·&nbsp; Genuine Leather</p>
      </div>
      <div class="product-price-wrap">
        <div class="product-price"><span class="currency">$</span>38,000</div>
        <p class="product-price-note">頂級工藝 · Luxury Craftsmanship</p>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <p class="footer-ornament">價格含稅 &nbsp;·&nbsp; Prices include tax &nbsp;·&nbsp; 如有變動恕不另行通知</p>
  </footer>

</div>
</body>
</html>
